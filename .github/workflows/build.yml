name: Build bypassusb
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 
        with:
          fetch-depth: 0 

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Release APK
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Sign APK
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks release.jks \
            --ks-key-alias "${{ secrets.ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out app/build/outputs/apk/release/WahBuddy_Signed.apk \
            "$UNSIGNED_APK"

      - name: Cleanup
        if: success() 
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName --jq '.[].tagName' | while read -r tag; do
            gh release delete "$tag" --yes --cleanup-tag || true
          done
          
          git fetch --tags
          git tag | xargs -I {} git push origin :refs/tags/{} || true
          
          gh run list --workflow "${{ github.workflow }}" --json databaseId --limit 50 | \
          jq -r '.[].databaseId' | grep -v "${{ github.run_id }}" | \
          xargs -I {} gh run delete {} || true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/bypassusb_signed.apk
          tag_name: v${{ github.run_number }}
          name: BypassUSB Release
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
